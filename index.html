<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Per Te ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }

        body {
            background: #fff0f3;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            position: relative; 
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 2px solid #ffb3c1;
            z-index: 10; 
            position: relative; 
            max-height: 90vh; 
            overflow-y: auto;
        }

        .container::-webkit-scrollbar { display: none; }
        .container { -ms-overflow-style: none; scrollbar-width: none; }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            color: #c9184a; 
            font-size: 3em; 
            margin: 0 0 10px 0;
        }

        p { 
            line-height: 1.6; 
            color: #590d22; 
            font-size: 1.1em; 
            margin: 0 0 20px 0;
        }

        /* --- STILE POLAROID --- */
        .polaroid {
            background: #fff;
            padding: 15px 15px 35px 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            display: inline-block;
            transform: rotate(-3deg);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid #eaeaea;
            margin: 15px 0 25px 0;
            max-width: 85%;
            border-radius: 2px;
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .polaroid img {
            width: 100%;
            height: auto;
            border-radius: 3px;
            display: block;
        }

        .polaroid-caption {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8em;
            color: #c9184a;
            margin-top: 15px;
            transition: opacity 0.3s;
        }

        /* --- STILE GENERATORE DI SORRISI --- */
        .btn-surprise {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        .btn-surprise:hover {
            background-color: #c9184a;
            transform: translateY(-2px);
        }

        .smile-box {
            min-height: 80px;
            margin-top: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 2em;
            color: #ff4d6d;
            line-height: 1.2;
            transition: opacity 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- STILE COUNTDOWN --- */
        #countdown-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ffb3c1;
        }
        
        #timer {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: #c9184a;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* --- CUORI CADENTI --- */
        .heart {
            position: absolute;
            color: #ffb3c1; 
            font-size: 1.5em;
            user-select: none;
            pointer-events: none; 
            z-index: 1; 
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bentornata Giò ❤️</h1>
        <p>SORPRESA.</p>

        <div class="polaroid" onclick="changeCaption()">
            <img id="polaroid-img" src="https://images.unsplash.com/photo-1518199266791-5375a83164ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Noi">
            <div class="polaroid-caption" id="polaroid-text">Clicca sulla foto ✨</div>
        </div>

        <div style="margin-top: 10px;">
            <p style="font-weight: 600; color: #590d22; margin-bottom: 5px;">Se hai una giornata no, o ti manco:</p>
            <button class="btn-surprise" onclick="generateSmile()">Ho bisogno di un sorriso</button>
            <div id="smile-box" class="smile-box">...</div>
        </div>

        <div id="countdown-section">
            <p style="font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 1.1em; margin: 0; color: #590d22;">Al nostro prossimo incontro mancano:</p>
            <div id="timer">Calcolando...</div>
        </div>

    </div>

    <script>
        // --- 1. POLAROID INTERATTIVA ---
        let polaroidState = 0;
        function changeCaption() {
            const text = document.getElementById('polaroid-text');
            text.style.opacity = 0; // Inizia dissolvenza
            
            setTimeout(() => {
                if(polaroidState === 0) {
                    text.innerText = "Siamo bellissimi! 💖";
                    polaroidState = 1;
                } else {
                    text.innerText = "Clicca sulla foto ✨";
                    polaroidState = 0;
                }
                text.style.opacity = 1; // Fine dissolvenza
            }, 300);
            
            // Lancia qualche cuoricino al click
            for(let i=0; i<5; i++) { setTimeout(createHeart, i * 100); }
        }

        // --- 2. GENERATORE DI SORRISI ---
        const smiles = [
            "Ricordati che puzzi.",
            "Sei la mia persona preferita.",
            "ODIO RIETI",
            "Non vedo l'ora di riabbracciarti fortissimo.",
            "LE PATATINEEEE",
            "sei bellissima quando sorridi",
            "a femmn chiu bell ro munn",
            "si a vita mi!!!!!.",
            "LA COCACOLAAAAAA",
            "CURAMI DOTTORESSA",
            "BAU BAU",
            "ti amo",
            "GGGP",
            "zibbellino",
            "miao miao miao",
            "di che colore sono i tuoi occhi?",
            "ti penso sempre",
            "E' NOTTE ALTA E SONO SVEGLIO",
            "SEI SEMPRE TU IL MIO CHIODO FISSO",
            "sono orgoglioso di te",
            "dobbiamo andare alle terme" // <-- Qui ho rimosso il punto finale che bloccava tutto!
        ];

        function generateSmile() {
            const box = document.getElementById('smile-box');
            box.style.opacity = 0; // Inizia dissolvenza
            
            setTimeout(() => {
                // Sceglie una frase a caso dalla lista "smiles"
                const randomIndex = Math.floor(Math.random() * smiles.length);
                box.innerText = smiles[randomIndex];
                box.style.opacity = 1; // Fine dissolvenza
            }, 400);
        }

        // --- 3. COUNTDOWN ---
        // 🔥 MODIFICA LA DATA QUI (Anno-Mese-GiornoTHre:Minuti:Secondi) 🔥
        const targetDate = new Date("2026-05-01T15:00:00").getTime(); 

        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "ARRIVO! ❤️";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `${days}g ${hours}h ${minutes}m ${seconds}s`;
        }, 1000);

        // --- 4. CUORI CADENTI ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw'; 
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; 
            heart.style.opacity = Math.random() * 0.5 + 0.2; 
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);
    </script>
</body>
</html>
