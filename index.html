<!DOCTYPE html>
<html lang="it">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Per Te ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
   <style>
        body {
            background: #fff0f3;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Questo assicura il centraggio perfetto */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
        }

        .container {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.2);
            max-width: 450px; /* Ridotto leggermente per stare meglio sui telefoni */
            width: 85%;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 3px solid #ffb3c1;
            animation: fadeIn 2s ease-in-out;
            /* Rimuove margini esterni che potrebbero spostarlo */
            margin: auto; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            color: #c9184a; 
            font-size: clamp(2.5em, 8vw, 3.5em); /* Si adatta alla grandezza dello schermo */
            margin-top: 0;
        }

        p { 
            line-height: 1.6; 
            color: #590d22; 
            font-size: 1.1em; 
            white-space: pre-wrap; 
            word-wrap: break-word; /* Evita che il testo esca dai bordi */
        }

        /* Il resto del CSS (bottoni e cuori) rimane uguale */
        .btn-surprise {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s;
    </style>
</head>
<body>

    <div class="container">
        <h1>X GIO ❤️</h1>
        
        <p>
            Scrivi qui la tua lettera...
            Puoi raccontarle quanto è importante per te,
            un ricordo speciale o semplicemente dirle grazie.
        </p>

        <button class="btn-surprise" onclick="showSurprise()">Clicca per una sorpresa</button>
        <div id="extra-message">puzzi ma ti amo lo stesso! ❤️</div>

        <p style="margin-top: 40px; font-weight: 600;">
            dal tuo futuro ingegnere, <br> GENNY. 
            (mi sono impegnato tantissimo).
        </p>
    </div>

    <script>
        // Funzione per mostrare il messaggio a sorpresa
        function showSurprise() {
            const msg = document.getElementById('extra-message');
            msg.style.display = 'block';
            
            // Fa esplodere più cuori al click
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        // Funzione per creare i cuori che cadono
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        // Crea cuori continuamente
        setInterval(createHeart, 400);
    </script>
</body>
</html>
