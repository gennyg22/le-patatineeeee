<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Per Te</title>
    <style>
        body {
            background: #fff0f3;
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 80%;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid #ffb3c1;
        }
        h1 { color: #c9184a; font-size: 2.5em; }
        p { line-height: 1.8; color: #590d22; font-size: 1.2em; white-space: pre-wrap; }
        
        /* Animazione cuori */
        .heart {
            position: fixed;
            top: -10px;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Per [GIO] ❤️</h1>
        <p>
            [SCRIVI QUI IL TUO MESSAGGIO:
            Puoi andare a capo premendo Invio 
            e il testo rimarrà ordinato!]
        </p>
        <p><strong>Tuo per sempre, [GENNY]</strong></p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
